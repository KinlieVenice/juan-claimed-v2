services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
      - "5555:5555"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/app?schema=public
      BACKEND_PORT: 4000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      JWT_SECRET: ${JWT_SECRET}
      EGOV_BASE_URL: ${EGOV_BASE_URL}
      EGOV_PARTNER_CODE: ${EGOV_PARTNER_CODE}
      EGOV_PARTNER_SECRET: ${EGOV_PARTNER_SECRET}
      EGOV_EVERIFY_CLIENT_ID: ${EGOV_EVERIFY_CLIENT_ID}
      EGOV_EVERIFY_CLIENT_SECRET: ${EGOV_EVERIFY_CLIENT_SECRET}
      EGOV_EVERIFY_PUBKEY: ${EGOV_EVERIFY_PUBKEY}
      EGOV_EMESSAGE_ACCESS_TOKEN: ${EGOV_EMESSAGE_ACCESS_TOKEN}
      EGOV_AI_ACCESS_CODE: ${EGOV_AI_ACCESS_CODE}
      EGOV_PAY_API_KEY: ${EGOV_PAY_API_KEY}
      EGOV_PAY_SETTLEMENT_TEMPLATE_UUID: ${EGOV_PAY_SETTLEMENT_TEMPLATE_UUID}
      EGOV_REPORT_ACCESS_TOKEN: ${EGOV_REPORT_ACCESS_TOKEN}
      EGOV_FACE_LIVENESS_API_KEY: ${EGOV_FACE_LIVENESS_API_KEY}
      EGOV_COMPASS_API_KEY: ${EGOV_COMPASS_API_KEY}
      BLOB_READ_WRITE_TOKEN_READ_WRITE_TOKEN: ${BLOB_READ_WRITE_TOKEN_READ_WRITE_TOKEN}
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5175:5175"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      # Client IDs are meant to be public (unlike JWT_SECRET/partner_secret) — safe to
      # expose to the browser bundle via Vite's VITE_ prefix convention.
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend


volumes:
  postgres_data:
